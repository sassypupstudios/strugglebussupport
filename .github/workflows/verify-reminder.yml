name: Weekly Listing Verification Reminder

on:
  schedule:
    # Every Monday at 2:00 AM Eastern (7:00 UTC during EDT, 8:00 UTC during EST)
    - cron: '0 7 * * 1'
  workflow_dispatch:   # Also allows manual trigger from GitHub Actions tab

jobs:
  send-reminder:
    runs-on: ubuntu-latest

    steps:
      - name: Build reminder email body
        id: build
        run: |
          DATE=$(TZ="America/New_York" date "+%A, %B %-d, %Y")
          echo "date=$DATE" >> $GITHUB_OUTPUT
          cat <<'BODY' > email_body.txt
          Hi Kiran! Time for the weekly listing check. 🚌

          Here's what to do:

          1. Open the Verification Dashboard:
             https://strugglebussupport.org/admin.html

          2. Listings are sorted oldest-verified first — start from the top.

          3. For each resource, call the phone number and confirm:
             - Still operating?
             - Hours still accurate?
             - Services still match the description?
             - Address / contact info changed?

          4. If anything changed, use the Suggest a Correction form:
             https://strugglebussupport.org/suggest.html

          5. Click "✓ Verified" on each listing you confirm.

          6. When done, click the green "Submit All Verified" button at the bottom.
             That's it! The code update will be emailed to the owner automatically.

          Priority categories (change most often):
          - Food pantries — hours and distribution days change frequently
          - Utilities/financial assistance — many programs are seasonal
          - Healthcare clinics — sliding scale rules and hours update
          - Substance recovery — program availability can shift

          Quick links:
          - Dashboard: https://strugglebussupport.org/admin.html
          - Suggest Form: https://strugglebussupport.org/suggest.html

          This reminder is sent automatically every Monday at 2 AM.
          BODY

      - name: Send verification reminder email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "📋 Weekly Listing Verification — ${{ steps.build.outputs.date }}"
          to: ${{ secrets.MAIL_USERNAME }}
          from: "Struggle Bus Support <${{ secrets.MAIL_USERNAME }}>"
          body: file://email_body.txt
